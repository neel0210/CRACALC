<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Canada Tax Engine 2026 | Professional Assessment</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --success: #10b981; --error: #f43f5e; --text: #f1f5f9; --border: #334155; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }
        .wrapper { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 25px; border: 1px solid var(--border); position: relative; }
        h2 { font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 15px; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; color: #cbd5e1; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-calc { background: var(--accent); color: white; }
        .btn-pdf { background: #475569; color: white; margin-top: 20px; display: none; }
        .res-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .total-box { margin-top: 20px; padding: 20px; border-radius: 8px; text-align: center; }
        .refund { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }
        .owing { background: rgba(244, 63, 94, 0.1); color: var(--error); border: 1px solid var(--error); }
        
        /* PRINT STYLES - This handles the PDF look */
        @media print {
            body { background: white; color: black; padding: 0; }
            .wrapper { display: block; }
            .card:first-child, .btn, #spouseToggle { display: none !important; } /* Hide inputs on PDF */
            .card { border: none; box-shadow: none; width: 100%; }
            #outCard { visibility: visible !important; display: block !important; }
            .res-row { border-bottom: 1px solid #eee; color: black; }
            .total-box { border: 2px solid #000; color: black !important; background: #f9f9f9 !important; }
            .badge, .est-msg { color: #666; font-style: italic; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <h1 style="margin:0 0 20px 0;">Tax Engine <span style="color:var(--accent)">2026</span></h1>
        
        <div class="input-grid">
            <div>
                <label>Province</label>
                <select id="prov"><option value="ON">Ontario</option><option value="BC">BC</option><option value="AB">Alberta</option></select>
            </div>
            <div>
                <label>Pay Cycle</label>
                <select id="freq"><option value="26">Bi-Weekly</option><option value="12">Monthly</option></select>
            </div>
        </div>

        <h2>Employment & Deductions</h2>
        <div class="input-grid">
            <div><label>Gross Salary</label><input type="number" id="gross" placeholder="0"></div>
            <div><label>RRSP Paid</label><input type="number" id="rrsp" placeholder="0"></div>
            <div><label>Tax Paid (T4)</label><input type="number" id="t4_tax" placeholder="0"></div>
        </div>

        <button id="spouseToggle" class="btn" style="background:#334155" onclick="this.nextElementSibling.style.display='block'; hasSpouse=true;">+ Add Spouse</button>
        <div style="display:none; margin-top:10px;" class="card">
            <label>Spouse Net Income (2026)</label>
            <input type="number" id="spouse_inc" value="0">
        </div>

        <button class="btn btn-calc" onclick="calculate()">Run 2026 Estimate</button>
    </div>

    <div id="outCard" class="card" style="visibility:hidden">
        <h1 style="margin-top:0">2026 Assessment <span class="badge" style="font-size:0.7rem; background:#444; padding:3px; border-radius:4px;">ESTIMATED</span></h1>
        <div id="resSummary"></div>
        
        <div id="paySection" style="margin-top:20px; padding:15px; background:#111827; border-radius:8px;">
            <h3 style="margin:0; font-size:0.75rem; color:var(--accent)">TAKE-HOME ESTIMATE</h3>
            <div id="payContent"></div>
        </div>

        <button id="pdfBtn" class="btn btn-pdf" onclick="window.print()">Download PDF Report</button>
        
        <p class="est-msg" style="font-size:0.65rem; color:#64748b; margin-top:20px;">
            *Results are <b>estimated</b> and vary based on actual 2026 CRA indexing and specific credit eligibility.
        </p>
    </div>
</div>

<script>
let hasSpouse = false;

function calculate() {
    const val = id => Number(document.getElementById(id).value) || 0;
    const pKey = document.getElementById('prov').value;
    const f = Number(document.getElementById('freq').value);

    // 2026 Projected Logic
    const FED_BPA = 16452;
    const totalInc = val('gross');
    const taxableInc = Math.max(0, totalInc - val('rrsp'));

    // Fed Tax (14% First Bracket Estimate)
    let fedTax = taxableInc > 58523 ? (58523 * 0.14) + (taxableInc - 58523) * 0.205 : taxableInc * 0.14;
    
    // Spousal Credit
    let spousalAmt = hasSpouse ? Math.max(0, FED_BPA - val('spouse_inc')) : 0;
    const netFed = Math.max(0, fedTax - (FED_BPA + spousalAmt) * 0.14);
    
    // Prov (Flat 7% Est for simplicity)
    const netProv = taxableInc * 0.07;
    const annualNet = totalInc - (netFed + netProv);
    const balance = (netFed + netProv) - val('t4_tax');

    document.getElementById('outCard').style.visibility = 'visible';
    document.getElementById('pdfBtn').style.display = 'block';
    
    document.getElementById('resSummary').innerHTML = `
        <div class="res-row"><span>Total Gross</span><span>$${totalInc.toFixed(2)}</span></div>
        <div class="res-row"><span>Taxable Income</span><span>$${taxableInc.toFixed(2)}</span></div>
        <div class="res-row"><span>Combined Taxes</span><span>$${(netFed + netProv).toFixed(2)}</span></div>
        <div class="total-box ${balance <= 0 ? 'refund' : 'owing'}">
            <strong>${balance <= 0 ? 'Estimated Refund' : 'Estimated Owed'}</strong><br>
            <span style="font-size:1.5rem">$${Math.abs(balance).toFixed(2)}</span>
        </div>
    `;

    document.getElementById('payContent').innerHTML = `
        <div class="res-row" style="border:none">
            <span>Net Take-Home Pay</span>
            <span style="color:var(--success); font-weight:800">$${(annualNet/f).toFixed(2)}</span>
        </div>
    `;
}
</script>
</body>
</html>
